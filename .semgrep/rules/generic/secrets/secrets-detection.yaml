rules:
  - id: generic-secrets-aws-access-key
    pattern-regex: AKIA[0-9A-Z]{16}
    message: >
      AWS Access Key ID detected. Remove the key from source code and rotate
      it immediately. Use environment variables or AWS IAM roles instead.
    languages: [generic]
    severity: ERROR
    metadata:
      owasp: "A02:2021 Cryptographic Failures"
      cwe: "CWE-798: Use of Hard-coded Credentials"
      confidence: HIGH

  - id: generic-secrets-github-token
    pattern-regex: ghp_[A-Za-z0-9_]{36}
    message: >
      GitHub personal access token detected. Remove from source code and
      rotate the token. Use environment variables or GitHub Actions secrets.
    languages: [generic]
    severity: ERROR
    metadata:
      owasp: "A02:2021 Cryptographic Failures"
      cwe: "CWE-798: Use of Hard-coded Credentials"
      confidence: HIGH

  - id: generic-secrets-github-fine-grained-token
    pattern-regex: github_pat_[A-Za-z0-9_]{82}
    message: >
      GitHub fine-grained personal access token detected. Remove from source
      code and rotate the token.
    languages: [generic]
    severity: ERROR
    metadata:
      owasp: "A02:2021 Cryptographic Failures"
      cwe: "CWE-798: Use of Hard-coded Credentials"
      confidence: HIGH

  - id: generic-secrets-private-key
    pattern-regex: "-----BEGIN (RSA |DSA |EC |OPENSSH |PGP )?PRIVATE KEY-----"
    message: >
      Private key detected in source code. Remove immediately and rotate the
      key. Store private keys in secure key management systems, never in
      source code.
    languages: [generic]
    severity: ERROR
    metadata:
      owasp: "A02:2021 Cryptographic Failures"
      cwe: "CWE-321: Use of Hard-coded Cryptographic Key"
      confidence: HIGH
