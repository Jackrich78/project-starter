<!DOCTYPE html>
<html>
<head>
<style>

body {

<body>
  <!-- Top zone -->

      <!-- Row 1: /explore → prd.md -->

          </div>
        </div>
        <div style="display: flex; justify-content: flex-start; flex: 1;">
          <div style="border: 2px solid #0D5B65; border-radius: 8px; padding: 10px 16px; width: 142px; text-align: center;">
            <p style="color: #6B7280; font-size: 22pt; margin: 0; font-family: Arial, sans-serif;">prd.md</p>
          </div>
        </div>
      </div>
      <p style="color: #6B7280; font-size: 32pt; margin: 4px 0; font-family: 'Arial Black', Arial, sans-serif; text-align: center;">&#8595;</p>

      <!-- Row 2: /blueprint → plan.md -->
      <div style="display: flex; align-items: center; width: 100%; gap: 12px;">
        <div style="display: flex; justify-content: flex-end; flex: 1;">
          <div style="background: #B6A2F1; border-radius: 8px; padding: 10px 16px; width: 299px; text-align: center;">
            <p style="color: #FFFFFF; font-size: 26pt; font-weight: bold; margin: 0; font-family: 'Arial Black', Arial, sans-serif; text-transform: uppercase;">/BLUEPRINT THE PLAN</p>
          </div>
        </div>
        <div style="display: flex; justify-content: flex-start; flex: 1;">
          <div style="border: 2px solid #B6A2F1; border-radius: 8px; padding: 10px 16px; width: 197px; text-align: center;">
            <p style="color: #6B7280; font-size: 22pt; margin: 0; font-family: Arial, sans-serif;">plan.md</p>
          </div>
        </div>
      </div>
      <p style="color: #6B7280; font-size: 32pt; margin: 4px 0; font-family: 'Arial Black', Arial, sans-serif; text-align: center;">&#8595;</p>

      <!-- Row 3: /build → tests + code -->
      <div style="display: flex; align-items: center; width: 100%; gap: 12px;">
        <div style="display: flex; justify-content: flex-end; flex: 1;">
          <div style="background: #29C9A5; border-radius: 8px; padding: 10px 16px; width: 246px; text-align: center;">
            <p style="color: #FFFFFF; font-size: 26pt; font-weight: bold; margin: 0; font-family: 'Arial Black', Arial, sans-serif; text-transform: uppercase;">/BUILD THE TESTS</p>

        </div>
        <div style="display: flex; justify-content: flex-start; flex: 1;">
          <div style="border: 2px solid #29C9A5; border-radius: 8px; padding: 10px 16px; width: 246px; text-align: center;">
            <p style="color: #6B7280; font-size: 22pt; margin: 0; font-family: Arial, sans-serif;">tests + code</p>
          </div>
        </div>
      </div>
      <p style="color: #6B7280; font-size: 32pt; margin: 4px 0; font-family: 'Arial Black', Arial, sans-serif; text-align: center;">&#8595;</p>

      <!-- Row 4: /qa → qa-report.md -->

            <p style="color: #6B7280; font-size: 22pt; margin: 0; font-family: Arial, sans-serif;">qa-report.md</p>

        </div>
      </div>
      <p style="color: #6B7280; font-size: 32pt; margin: 4px 0; font-family: 'Arial Black', Arial, sans-serif; text-align: center;">&#8595;</p>

      <div style="display: flex; align-items: center; width: 100%; gap: 12px;">
        <div style="display: flex; justify-content: flex-end; flex: 1;">
          <div style="background: #A4E001; border-radius: 8px; padding: 10px 16px; width: 142px; text-align: center;">
            <p style="color: #FFFFFF; font-size: 26pt; font-weight: bold; margin: 0; font-family: 'Arial Black', Arial, sans-serif; text-transform: uppercase;">/COMMIT IT</p>
          </div>
        </div>
        <div style="display: flex; justify-content: flex-start; flex: 1;">

            <p style="color: #6B7280; font-size: 22pt; margin: 0; font-family: Arial, sans-serif;">changelog + merged</p>
          </div>
        </div>
      </div>

      <!-- Annotations -->
      <div style="display: flex; width: 100%; margin-top: 16px;">
        <div style="flex: 1; text-align: right; padding-right: 20px;">
          <p style="color: #6B7280; font-size: 22pt; font-weight: bold; font-style: italic; margin: 0; font-family: Arial, sans-serif;">Uncertainty fades</p>
        </div>
        <div style="flex: 1; text-align: left; padding-left: 20px;">
          <p style="color: #6B7280; font-size: 22pt; font-weight: bold; font-style: italic; margin: 0; font-family: Arial, sans-serif;">Understanding builds</p>

    <img src="../../../../.claude/skills/linkedin-carousel/references/jack_headshot_6_no_bg.png" style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover;" />
