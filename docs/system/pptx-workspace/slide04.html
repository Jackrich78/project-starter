<!DOCTYPE html>
<html>
<head>
<style>
html { background: #FFFFFF; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #FFFFFF; font-family: Arial, sans-serif;
  display: flex; flex-direction: column;
}
</style>
</head>
<body>
  <!-- HEADER -->
  <div style="padding: 18pt 30pt 0 30pt;">
    <p style="color: #6B7280; font-size: 9pt; font-weight: bold; margin: 0 0 4pt 0; font-family: Arial, sans-serif;">THE SOLUTION</p>
    <h1 style="color: #1A1A2E; font-size: 28pt; font-weight: bold; margin: 0; font-family: Arial, sans-serif;">A workflow template, not a framework</h1>
  </div>
  <!-- CONTENT -->
  <div style="padding: 6pt 30pt 50pt 30pt; flex: 1; display: flex; flex-direction: column;">
    <!-- Two diagrams side by side -->
    <div style="display: flex; gap: 16pt; margin-bottom: 8pt; flex: 1;">
      <!-- Left: Venn -->
      <div style="flex: 1; display: flex; flex-direction: column; align-items: center;">
        <p style="color: #6B7280; font-size: 9pt; font-weight: bold; margin: 0 0 4pt 0; font-family: Arial, sans-serif;">WHAT YOU CAN INFLUENCE</p>
        <img src="../diagrams/claude-code-venn.png" style="width: 220pt; height: 196pt;">
      </div>
      <!-- Right: Harness Architecture -->
      <div style="flex: 1; display: flex; flex-direction: column; align-items: center;">
        <p style="color: #6B7280; font-size: 9pt; font-weight: bold; margin: 0 0 4pt 0; font-family: Arial, sans-serif;">HOW PROJECT STARTER LAYERS IT</p>
        <img src="../diagrams/harness-architecture.png" style="width: 260pt; height: 196pt;">
      </div>
    </div>
    <!-- Bottom: callout + stats -->
    <div style="display: flex; gap: 10pt;">
      <div style="flex: 2; background: #1A1A2E; padding: 8pt 14pt; border-radius: 4pt;">
        <p style="color: #FFFFFF; font-size: 10pt; margin: 0; font-family: Arial, sans-serif;">Fork it, customize it, start building. Knowledge compounds with every feature you ship.</p>
      </div>
      <div style="flex: 1; display: flex; gap: 6pt;">
        <div style="flex: 1; background: #F3F4F6; padding: 6pt; border-radius: 4pt; text-align: center;">
          <p style="color: #2563EB; font-size: 20pt; font-weight: bold; margin: 0; font-family: Arial, sans-serif;">14</p>
          <p style="color: #6B7280; font-size: 8pt; margin: 0; font-family: Arial, sans-serif;">commands</p>
        </div>
        <div style="flex: 1; background: #F3F4F6; padding: 6pt; border-radius: 4pt; text-align: center;">
          <p style="color: #E63946; font-size: 20pt; font-weight: bold; margin: 0; font-family: Arial, sans-serif;">12</p>
          <p style="color: #6B7280; font-size: 8pt; margin: 0; font-family: Arial, sans-serif;">agents</p>
        </div>
        <div style="flex: 1; background: #F3F4F6; padding: 6pt; border-radius: 4pt; text-align: center;">
          <p style="color: #10B981; font-size: 20pt; font-weight: bold; margin: 0; font-family: Arial, sans-serif;">17</p>
          <p style="color: #6B7280; font-size: 8pt; margin: 0; font-family: Arial, sans-serif;">skills</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
