<!-- Template: Section Divider
     Capacity: ~15 words
     Best for: Section breaks, topic transitions, chapter markers
-->
<!DOCTYPE html>
<html>
<head>
<style>
:root {
  --primary: #2C3E50;
  --accent: #3498DB;
  --bg: #FFFFFF;
  --bg-alt: #F0F3F5;
  --text: #333333;
  --text-light: #666666;
}
html { background: var(--primary); }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: var(--primary); font-family: Arial, sans-serif;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center;
}
h1 { color: #FFFFFF; font-size: 42pt; margin: 0; font-weight: bold; }
p { color: var(--bg-alt); font-size: 18pt; margin: 15pt 0 0 0; line-height: 1.4; }
</style>
</head>
<body>
  <h1>Section Title</h1>
  <p>Brief context or transition statement</p>
</body>
</html>
