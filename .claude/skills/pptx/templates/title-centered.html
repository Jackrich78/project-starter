<!-- Template: Title Centered
     Capacity: ~20 words
     Best for: Opening slides, section intros, closing slides
-->
<!DOCTYPE html>
<html>
<head>
<style>
:root {
  --primary: #2C3E50;
  --accent: #3498DB;
  --bg: #FFFFFF;
  --bg-alt: #F0F3F5;
  --text: #333333;
  --text-light: #666666;
}
html { background: var(--bg); }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: var(--bg); font-family: Arial, sans-serif;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center;
}
h1 {
  color: var(--primary); font-size: 46pt; margin: 0;
  font-weight: bold;
}
h2 {
  color: var(--text-light); font-size: 24pt; margin: 15pt 0 0 0;
  font-weight: normal;
}
p {
  color: var(--accent); font-size: 16pt; margin: 40pt 0 0 0;
  line-height: 1.4;
}
</style>
</head>
<body>
  <h1>Presentation Title Goes Here</h1>
  <h2>Supporting Subtitle with Context</h2>
  <p>A brief tagline or date for the presentation</p>
</body>
</html>
