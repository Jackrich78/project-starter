# .github/workflows/stack-cloudflare.yml
# Cloudflare stack tests - runs only when stacks/cloudflare/ changes

name: Stack - Cloudflare

on:
  push:
    branches: ['**']
    paths:
      - 'stacks/cloudflare/**'
      - '.github/workflows/stack-cloudflare.yml'
  pull_request:
    branches: ['**']
    paths:
      - 'stacks/cloudflare/**'
      - '.github/workflows/stack-cloudflare.yml'

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test Cloudflare Stack
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: stacks/cloudflare

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: stacks/cloudflare/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm test

      # CUSTOMIZATION: Add deployment steps below (requires secrets)
      # Example: wrangler deploy --env production
